name: Claude Code Review

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  review:
    if: >-
      github.event.issue.pull_request &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      actions: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.issue.number }}

            You are triggered by a comment on a PR. Do exactly what the comment asks — nothing more.

            CLAUDE.md has the project conventions — use them.

            If asked to review the PR, follow these review guidelines:

            Focus on (in priority order):
            1. Bugs and logic errors
            2. Security:
               - Missing auth checks, data ownership leaks
               - Secrets or credentials in committed code
               - Raw SQL without parameterization
               - WCL API key exposure
            3. Suspicious dependency additions in package.json
            4. N+1 queries or unbounded database fetches
            5. Prisma schema ↔ API route mismatches

            Skip:
            - Formatting, style, and type hygiene (CI and linters handle that)
            - Trivial nitpicks
            - Suggestions that add complexity without clear value

            Be direct. Only comment when something should change.

            Use `gh pr comment` with your Bash tool to leave your review as a comment on the PR.

            End with a single verdict:
            - ✅ if no issues found
            - ⚠️ with short bullet points if there are issues that should be fixed before merging
          claude_args: |
            --allowedTools "Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh issue create:*),Bash(gh api:repos/*/pulls/*/comments*),Bash(gh api:repos/*/issues/*/comments*)"
